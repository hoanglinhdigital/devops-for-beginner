apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  alert_rules.yml: |
    groups:
      - name: application_alerts
        rules:
          # Alert when the Backend Pod is down
          - alert: BackendPodDown
            expr: absent(up{kubernetes_pod_name=~"backend.*"}) or up{kubernetes_pod_name=~"backend.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Backend Pod is down"
              description: "The backend pod has been down for more than 1 minute."

          # Alert when the Frontend Pod is down
          - alert: FrontendPodDown
            expr: absent(up{kubernetes_pod_name=~"frontend.*"}) or up{kubernetes_pod_name=~"frontend.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Frontend Pod is down"
              description: "The frontend pod has been down for more than 1 minute."

          # Alert when the Mongo Pod is down
          - alert: MongoPodDown
            expr: absent(up{kubernetes_pod_name=~"mongo.*"}) or up{kubernetes_pod_name=~"mongo.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Mongo Pod is down"
              description: "The mongo pod has been down for more than 1 minute."

      - name: resource_alerts
        rules:
          # Alert on High CPU Usage (e.g., > 80% usage)
          - alert: HighCPUUsage
            expr: sum(rate(container_cpu_usage_seconds_total{container!="", container!="POD"}[2m])) by (pod) > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU Usage on Pod"
              description: "Pod {{ $labels.pod }} is using high CPU."

          # Alert on High Memory Usage (e.g., > 80% usage)
          - alert: HighMemoryUsage
            expr: sum(container_memory_usage_bytes{container!="", container!="POD"}) by (pod) / sum(container_spec_memory_limit_bytes{container!="", container!="POD"} > 0) by (pod) > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High Memory Usage on Pod"
              description: "Pod {{ $labels.pod }} is using high Memory (>80% of limit)."